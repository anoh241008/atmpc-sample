########################################
# PRODUCTION DATABASE
########################################

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


########################################
# SERVER
########################################

server.port=${PORT:8080}


########################################
# JPA PRODUCTION
########################################

spring.jpa.hibernate.ddl-auto=none


########################################
# FILE UPLOAD CONFIGURATION
########################################

upload.dir=${UPLOAD_DIR}
upload.photo.dir=${UPLOAD_PHOTO_DIR}


########################################
# EMAIL CONFIGURATION
########################################

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=atmpcofficial@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD}
spring.mail.protocol=smtp

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.mail.properties.mail.smtp.debug=false


########################################
# FRONTEND URL
########################################

app.frontend.url=https://atmpc.org


########################################
# JWT TOKEN
########################################

app.token.key=${JWT_SECRET}


########################################
# CLOUDFLARE TURNSTILE CAPTCHA
########################################

turnstile.secret=${TURNSTILE_SECRET}